<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سابسکریپشن Nova</title>
  <style>
    body { font-family: Tahoma; padding: 20px; background: #111; color: #0f0; }
    h1 { text-align: center; }
    pre { 
      background: #1e1e1e; 
      padding: 15px; 
      border-radius: 8px; 
      overflow-x: auto; 
      white-space: pre-wrap;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      background: #0f0;
      color: black;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>سابسکریپشن VLESS - Nova</h1>
  <button onclick="loadSub()">بارگذاری کانفیگ‌ها</button>
  <br><br>
  <pre id="output">دکمه بالا رو بزن...</pre>

  <script>
    const subUrl = "https://pipela.erfan-3rfan.workers.dev/sub?token=f642f37ade634760f6e7fea95ab0c94b";

    async function loadSub() {
      const output = document.getElementById('output');
      output.textContent = "در حال بارگذاری...";

      try {
        const res = await fetch(subUrl);
        const text = await res.text();
        
        if (text.includes("vless://")) {
          output.textContent = text;
        } else {
          output.textContent = "خطا در دریافت سابسکریپشن";
        }
      } catch (err) {
        output.textContent = "خطای اتصال: " + err.message;
      }
    }

    // خودکار بارگذاری موقع باز شدن صفحه
    window.onload = loadSub;
  </script>
</body>
</html>
