<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لیست سرورها</title>
    <style>
        body {
            font-family: 'Tahoma', 'Vazir', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .server-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .server-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .server-name {
            font-weight: bold;
            color: #4a5568;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        .server-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
            font-size: 0.9em;
            color: #718096;
        }
        .detail-item {
            background: #f7fafc;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .copy-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: #38a169;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        .error {
            background: #fc8181;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stats {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 لیست سرورهای من</h1>
            <p>در حال دریافت اطلاعات...</p>
        </div>
        <div id="content">
            <div class="loading">⏳ در حال بارگذاری سرورها...</div>
        </div>
    </div>

    <script>
        const proxyUrl = 'https://api.allorigins.win/raw?url=';
        const targetUrl = 'https://pipela.erfan-3rfan.workers.dev/sub?token=f642f37ade634760f6e7fea95ab0c94b';
        
        async function fetchServers() {
            try {
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!response.ok) throw new Error('مشکل در دریافت اطلاعات');
                
                const text = await response.text();
                const servers = parseV2RayLinks(text);
                displayServers(servers);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">❌ خطا: ${error.message}<br>بررسی اتصال اینترنت و لینک سابسکریپشن</div>`;
            }
        }
        
        function parseV2RayLinks(text) {
            const lines = text.split('\n').filter(line => line.trim().startsWith('vless://'));
            const servers = [];
            
            for (let line of lines) {
                try {
                    // استخراج نام از انتهای لینک (بعد از #)
                    let name = 'بدون نام';
                    const hashIndex = line.indexOf('#');
                    if (hashIndex !== -1) {
                        name = decodeURIComponent(line.substring(hashIndex + 1));
                    }
                    
                    // استخراج اطلاعات پایه
                    let vlessPart = line;
                    if (hashIndex !== -1) {
                        vlessPart = line.substring(0, hashIndex);
                    }
                    
                    const url = new URL(vlessPart);
                    const serverIP = url.hostname;
                    const port = url.port || 443;
                    
                    servers.push({
                        name: name,
                        fullLink: line,
                        serverIP: serverIP,
                        port: port,
                        type: 'VLESS'
                    });
                } catch(e) {
                    console.error('خطا در parsing:', e);
                }
            }
            
            return servers;
        }
        
        function displayServers(servers) {
            if (servers.length === 0) {
                document.getElementById('content').innerHTML = 
                    '<div class="error">⚠️ هیچ سروری یافت نشد</div>';
                return;
            }
            
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="stats">
                    📊 تعداد کل سرورها: ${servers.length} | 🔒 پروتکل: VLESS
                </div>
                <div id="servers-list"></div>
            `;
            
            const serversList = document.getElementById('servers-list');
            
            for (let server of servers) {
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div class="server-name">🖥️ ${escapeHtml(server.name)}</div>
                    <div class="server-details">
                        <div class="detail-item">📡 پروتکل: ${server.type}</div>
                        <div class="detail-item">🌐 آدرس: ${server.serverIP}</div>
                        <div class="detail-item">🔌 پورت: ${server.port}</div>
                    </div>
                    <button class="copy-btn" onclick="copyToClipboard('${escapeHtml(server.fullLink).replace(/'/g, "\\'")}')">
                        📋 کپی لینک کانفیگ
                    </button>
                `;
                serversList.appendChild(card);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ لینک کانفیگ کپی شد!');
            }).catch(() => {
                alert('❌ خطا در کپی کردن');
            });
        }
        
        fetchServers();
    </script>
</body>
</html>
