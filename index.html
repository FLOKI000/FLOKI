<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Config Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            text-align: left;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 8px;
            background: #f0f0f0;
        }
        .download-btn {
            background: #28a745;
        }
        .download-btn:hover {
            background: #218838;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 تبدیل کننده کانفیگ Xray</h1>
        <p>تغییر TLS از هر مقداری به none و ذخیره در فایل xray</p>
        
        <div>
            <input type="text" id="urlInput" value="https://pipela.erfan-3rfan.workers.dev/sub?token=f642f37ade634760f6e7fea95ab0c94b" readonly style="background:#f5f5f5;">
            <br>
            <button id="fetchBtn">📥 دریافت و تبدیل کانفیگ</button>
            <button id="downloadBtn" class="download-btn" style="display:none;">💾 دانلود فایل xray</button>
        </div>
        
        <div id="status" class="status"></div>
        <pre id="output"></pre>
    </div>

    <script>
        async function fetchAndConvert() {
            const url = document.getElementById('urlInput').value;
            const statusDiv = document.getElementById('status');
            const outputPre = document.getElementById('output');
            const downloadBtn = document.getElementById('downloadBtn');
            
            statusDiv.innerHTML = '⏳ در حال دریافت کانفیگ از سرور...';
            outputPre.textContent = '';
            downloadBtn.style.display = 'none';
            
            try {
                // دریافت فایل سابسکریپشن
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const text = await response.text();
                statusDiv.innerHTML = '✅ فایل دریافت شد. در حال تبدیل...';
                
                // تغییر TLS به none در تمام کانفیگ‌ها
                let convertedText = text;
                
                // روش اول: تغییر در لینک‌های VLESS
                convertedText = convertedText.replace(/&tls=[^&]+/g, '&tls=none');
                convertedText = convertedText.replace(/\?tls=[^&]+/g, '?tls=none');
                convertedText = convertedText.replace(/security=tls/g, 'security=none');
                convertedText = convertedText.replace(/tls=true/g, 'tls=none');
                convertedText = convertedText.replace(/tls=1/g, 'tls=none');
                convertedText = convertedText.replace(/tls=yes/g, 'tls=none');
                convertedText = convertedText.replace(/tls=reality/g, 'tls=none');
                
                // روش دوم: تغییر در کانفیگ‌های base64 شده
                try {
                    // اگر محتوا base64 است، آن را دیکد کنید
                    if (isBase64(convertedText)) {
                        const decoded = atob(convertedText);
                        let modifiedDecoded = decoded.replace(/&tls=[^&]+/g, '&tls=none');
                        modifiedDecoded = modifiedDecoded.replace(/\?tls=[^&]+/g, '?tls=none');
                        modifiedDecoded = modifiedDecoded.replace(/security=tls/g, 'security=none');
                        modifiedDecoded = modifiedDecoded.replace(/tls=true/g, 'tls=none');
                        modifiedDecoded = modifiedDecoded.replace(/tls=1/g, 'tls=none');
                        modifiedDecoded = modifiedDecoded.replace(/tls=yes/g, 'tls=none');
                        convertedText = btoa(modifiedDecoded);
                    }
                } catch(e) {
                    console.log('Not base64 or error in decoding:', e);
                }
                
                // روش سوم: تغییر در کانفیگ‌های JSON مانند
                convertedText = convertedText.replace(/"tls":\s*"[^"]+"/g, '"tls":"none"');
                convertedText = convertedText.replace(/"tls":\s*[^,}]+/g, '"tls":"none"');
                convertedText = convertedText.replace(/"security":\s*"[^"]+"/g, '"security":"none"');
                
                statusDiv.innerHTML = '✅ تبدیل با موفقیت انجام شد! TLS به none تغییر کرد.';
                outputPre.textContent = convertedText;
                downloadBtn.style.display = 'inline-block';
                
                // ذخیره در localStorage به عنوان فایل xray
                localStorage.setItem('xray_config', convertedText);
                
                return convertedText;
                
            } catch (error) {
                statusDiv.innerHTML = `❌ خطا: ${error.message}`;
                console.error('Error:', error);
                return null;
            }
        }
        
        function isBase64(str) {
            try {
                return btoa(atob(str)) === str;
            } catch (err) {
                return false;
            }
        }
        
        function downloadAsFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
        
        // رویدادها
        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const content = await fetchAndConvert();
            if (content) {
                // نمایش پیام ذخیره خودکار در حافظه مرورگر
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML += '<br>📁 فایل در حافظه مرورگر به عنوان "xray" ذخیره شد. برای دانلود دائم روی دکمه سبز کلیک کنید.';
            }
        });
        
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const content = localStorage.getItem('xray_config');
            if (content) {
                downloadAsFile(content, 'xray');
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML += '<br>💾 فایل xray با موفقیت دانلود شد!';
            } else {
                alert('لطفا ابتدا روی دکمه "دریافت و تبدیل کانفیگ" کلیک کنید.');
            }
        });
        
        // بارگذاری خودکار در شروع
        window.addEventListener('load', () => {
            fetchAndConvert();
        });
    </script>
</body>
</html>
