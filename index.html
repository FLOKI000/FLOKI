<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمایشگر کانفیگ</title>
    <style>
        body { font-family: Tahoma, sans-serif; direction: rtl; background: #f0f0f0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
        button { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        h1 { color: #333; }
        .status { margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 محتوا از لینک مورد نظر</h1>
    <button id="fetchBtn">بارگیری محتوا</button>
    <div class="status" id="status"></div>
    <pre id="output">برای مشاهده، دکمه را بزنید...</pre>
</div>

<script>
    const url = "https://pipela.erfan-3rfan.workers.dev/sub?token=f642f37ade634760f6e7fea95ab0c94b";

    document.getElementById("fetchBtn").addEventListener("click", async () => {
        const statusDiv = document.getElementById("status");
        const outputPre = document.getElementById("output");

        statusDiv.textContent = "⏳ در حال بارگیری...";
        outputPre.textContent = "";

        try {
            const response = await fetch(url, {
                method: "GET",
                headers: { "Accept": "text/plain" }
            });

            if (!response.ok) throw new Error(`خطای HTTP: ${response.status}`);

            const text = await response.text();
            outputPre.textContent = text;
            statusDiv.textContent = "✅ بارگیری کامل شد. تمام محتوا نمایش داده شده است.";
        } catch (error) {
            statusDiv.textContent = "❌ خطا در بارگیری";
            outputPre.textContent = `خطا: ${error.message}\n\nتوجه: ممکن است سرور اجازه دسترسی از داخل صفحه را ندهد. می‌توانید از یک سرور میانی (proxy) استفاده کنید.`;
        }
    });
</script>
</body>
</html>
